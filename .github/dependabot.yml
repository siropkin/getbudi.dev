version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - type:deps
    groups:
      # Bundle minor + patch bumps into one PR per ecosystem to keep noise low.
      # Major bumps stay separate so they get individual review.
      npm-minor:
        applies-to: version-updates
        update-types: [minor, patch]
      astro:
        patterns: ["astro", "@astrojs/*"]
      eslint:
        patterns: ["eslint", "eslint-*", "@eslint/*", "typescript-eslint"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - type:deps
    groups:
      gha-minor:
        applies-to: version-updates
        update-types: [minor, patch]
