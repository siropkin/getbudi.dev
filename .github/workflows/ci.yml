name: CI

on:
  pull_request:
  push:
    branches: [main]

# Jobs split so a red signal surfaces fast: format / lint / type-check / tests
# all run in parallel against a fresh node_modules. Build + audit + lychee run
# after because they need the compiled `dist/`.
jobs:
  format:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Astro type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Astro build (chains audit-build + generate-csp)
        run: npm run build

  link-check:
    name: External link health
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build site
        run: npm run build
      - name: Check outbound links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --root-dir "${{ github.workspace }}/dist" 'dist/**/*.html'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true
