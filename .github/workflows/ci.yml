name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: Astro type check
        run: npm run check

      - name: Astro build
        run: npm run build

      - name: Static build audit
        run: npm run audit

  link-check:
    name: External link health
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check outbound links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --root-dir "${{ github.workspace }}/dist" 'dist/**/*.html'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true
